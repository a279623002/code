version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: go-zero-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      # 同时初始化 order 与 user 数据库
      - ../go-zero-order/deploy/mysql/init.sql:/docker-entrypoint-initdb.d/01-order.sql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/02-user.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 5

  etcd:
    image: bitnami/etcd:3.5
    container_name: go-zero-etcd
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - etcd-data:/bitnami/etcd

volumes:
  mysql-data:
  etcd-data:
