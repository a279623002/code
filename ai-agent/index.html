    <script>
        function parseMarkdown(md) {
            let html = md
                // 1. 代码块（多行，必须最先处理，避免内部 **、* 被破坏）
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                // 2. 行内代码（优先于粗斜体，避免代码中的 ** 被误转）
                .replace(/`(.*?)`/g, '<code>$1</code>')
                // 3. 标题（块级，先处理避免被段落包裹）
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                // 4. 引用
                .replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>')
                // 5. 图片（必须在斜体 * 处理之前，因为 alt 可能含 *）
                .replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">')
                // 6. 粗斜体、粗体、斜体
                .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                // 7. 列表（支持多行 li 整体包 ul）
                .replace(/^- (.*$)/gim, '<li>$1</li>')
                .replace(/(?:<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
                // 8. 段落（排除已有的块级与图片标签）
                .replace(/\n\n/g, '</p><p>')
                .replace(/^(?!<(h\d|ul|p|li|blockquote|img|pre|code))(.+)$/gim, '<p>$2</p>');
            return html;
        }

        $(document).ready(function () {
            $('.md-btn').click(function () {
                const file = $(this).data('file');
                $.get('./md/' + file, function (data) {
                    const html = parseMarkdown(data);
                    $('#mdContent').html(html);
                    $('#mdModal').show();
                });
            });

            $('#closeBtn').click(function () {
                $('#mdModal').hide();
            });

            $('#mdModal').click(function (e) {
                if (e.target === this) {
                    $('#mdModal').hide();
                }
            });
        });
    </script>
