    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9998;
            overflow-y: auto;
        }

        .modal-content {
            position: relative;
            background: #fff;
            margin: 1rem auto;
            padding: 1rem;
            max-width: 90%;
            border-radius: 0.5rem;
        }

        .close-btn {
            position: fixed;
            top: 0.5rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #000;
            z-index: 9999;
        }

        .md-content h1 {
            font-size: 0.6rem;
            margin: 0.5rem 0;
            overflow-wrap: anywhere;
        }

        .md-content h2 {
            font-size: 0.55rem;
            margin: 0.4rem 0;
            overflow-wrap: anywhere;
        }

        .md-content h3 {
            font-size: 0.5rem;
            margin: 0.3rem 0;
            overflow-wrap: anywhere;
        }

        .md-content p {
            margin: 0.3rem 0;
            overflow-wrap: anywhere;
        }

        .md-content ul,
        .md-content ol {
            padding-left: 1rem;
            margin: 0.3rem 0;
        }

        .md-content li {
            overflow-wrap: anywhere;
        }

        .md-content blockquote {
            margin: 0.5rem 0;
            padding: 0.3rem 0.5rem 0.3rem 0.8rem;
            border-left: 3px solid #ddd;
            background: #f9f9f9;
            color: #555;
            overflow-wrap: anywhere;
        }

        .md-content code {
            background: #f0f0f0;
            padding: 0.1rem 0.3rem;
            border-radius: 0.2rem;
            overflow-wrap: anywhere;
        }

        .md-content pre {
            background: #f0f0f0;
            padding: 0.5rem;
            border-radius: 0.3rem;
            white-space: pre;
            overflow-x: auto;
            max-width: 100%;
        }

        .md-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0.5rem auto;
        }

        .md-content .table-wrap {
            overflow-x: auto;
            margin: 0.5rem 0;
            max-width: 100%;
        }

        .md-content table {
            border-collapse: collapse;
            width: 100%;
            min-width: max-content;
            font-size: 0.75rem;
        }

        .md-content th,
        .md-content td {
            border: 1px solid #ddd;
            padding: 0.3rem 0.5rem;
            text-align: left;
        }

        .md-content th {
            background: #f5f5f5;
            font-weight: bold;
        }

        /* 兜底：弹窗整体横向溢出滚动，挡住任何未知超宽内容撑破 modal */
        .md-content {
            overflow-x: auto;
            max-width: 100%;
        }
    </style>

    <script>
        // 初始化 markdown-it（UMD 全局变量 window.markdownit）
        // html:false  禁用原始 HTML 标签防 XSS
        // linkify:true 自动识别裸链接
        // typographer:false 中文项目关闭，避免 "智能" 引号变英文引号
        // breaks:false 双换行才分段，遵循 CommonMark
        const md = window.markdownit({
            html: false,
            linkify: true,
            typographer: false,
            breaks: false
        });

        // 自定义图片渲染：剥 ../ 前缀
        // md 在 md/ 目录，引用 ../images/xxx 指向 ai-agent/images/xxx
        // 渲染到 index.html 时浏览器按 ai-agent/ 解析路径，需要去掉前导的 ../
        const defaultImageRender = md.renderer.rules.image
            || function (tokens, idx, options, env, self) {
                return self.renderToken(tokens, idx, options);
            };
        md.renderer.rules.image = function (tokens, idx, options, env, self) {
            const token = tokens[idx];
            const srcIdx = token.attrIndex('src');
            if (srcIdx >= 0 && token.attrs[srcIdx][1].startsWith('../')) {
                token.attrs[srcIdx][1] = token.attrs[srcIdx][1].replace(/^\.\.\//, '');
            }
            return defaultImageRender(tokens, idx, options, env, self);
        };

        // 表格外包 .table-wrap，配合 CSS 出横向滚动条
        md.renderer.rules.table_open = function () {
            return '<div class="table-wrap"><table>';
        };
        md.renderer.rules.table_close = function () {
            return '</table></div>';
        };

        function parseMarkdown(content) {
            return md.render(content);
        }

        $(document).ready(function () {
            $('.md-btn').click(function () {
                const file = $(this).data('file');
                $.get('./md/' + file, function (data) {
                    const html = parseMarkdown(data);
                    $('#mdContent').html(html);
                    $('#mdModal').show();
                });
            });

            $('#closeBtn').click(function () {
                $('#mdModal').hide();
            });

            $('#mdModal').click(function (e) {
                if (e.target === this) {
                    $('#mdModal').hide();
                }
            });
        });
    </script>
