<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>note</title>
    <script src="../assets/js/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/font.js"></script>
    <link rel="stylesheet" href="../assets/css/public.css">
    <link rel="stylesheet" href="../assets/css/note.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9998;
            overflow-y: auto;
        }
        .modal-content {
            position: relative;
            background: #fff;
            margin: 1rem auto;
            padding: 1rem;
            max-width: 90%;
            border-radius: 0.5rem;
        }
        .close-btn {
            position: fixed;
            top: 0.5rem;
            right: 1rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #fff;
            z-index: 9999;
        }
        .md-content h1 { font-size: 1rem; margin: 0.5rem 0; }
        .md-content h2 { font-size: 0.8rem; margin: 0.4rem 0; }
        .md-content h3 { font-size: 0.7rem; margin: 0.3rem 0; }
        .md-content p { margin: 0.3rem 0; }
        .md-content ul, .md-content ol { padding-left: 1rem; margin: 0.3rem 0; }
        .md-content code { background: #f0f0f0; padding: 0.1rem 0.3rem; border-radius: 0.2rem; }
        .md-content pre { background: #f0f0f0; padding: 0.5rem; border-radius: 0.3rem; overflow-x: auto; }
    </style>
</head>
<body>
<header></header>
<main>
    <div class="row">
        <a href="javascript:void(0);" class="col md-btn" data-file="Extra01-参考答案.md">参考答案</a>
        <a href="javascript:void(0);" class="col md-btn" data-file="Extra02-上下文工程补充知识.md">上下文工程补充知识</a>
    </div>
    <div class="row">
        <a href="javascript:void(0);" class="col md-btn" data-file="Extra05-AgentSkills解读.md">skills</a>
    </div>
    <a href="javascript:history.go(-1);" class="back"></a>
</main>

<div class="modal" id="mdModal">
    <span class="close-btn" id="closeBtn">&times;</span>
    <div class="modal-content">
        <div class="md-content" id="mdContent"></div>
    </div>
</div>

<script>
function parseMarkdown(md) {
    let html = md
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code>$1</code>')
        .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
        .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
        .replace(/^- (.*$)/gim, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[h|u|p|l])(.*)$/gim, '<p>$1</p>');
    return html;
}

$(document).ready(function() {
    $('.md-btn').click(function() {
        const file = $(this).data('file');
        $.get('./md/' + file, function(data) {
            const html = parseMarkdown(data);
            $('#mdContent').html(html);
            $('#mdModal').show();
        });
    });
    
    $('#closeBtn').click(function() {
        $('#mdModal').hide();
    });
    
    $('#mdModal').click(function(e) {
        if (e.target === this) {
            $('#mdModal').hide();
        }
    });
});
</script>
</body>
</html>
